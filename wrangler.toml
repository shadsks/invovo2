# Invoice Studio — Cloudflare Worker with static assets + D1-backed licensing.
#
# This file is ONLY consumed by wrangler CLI users (`wrangler deploy`, `wrangler d1 create`).
# If you're deploying via the Cloudflare dashboard's drag-and-drop / Direct Upload, ignore this
# file entirely — create the D1 database, run scripts/schema.sql, and add the bindings/secrets
# from the Pages project's Settings tab instead (all point-and-click, see AUTH.md).
#
# CLI deploy:  npx wrangler deploy
# CLI secrets: npx wrangler secret put LICENSE_SECRET   (and NVIDIA_API_KEY for smart features)
name = "invoice-studio"
main = "_worker.js"
compatibility_date = "2025-01-01"

# Serve the app's static files. .assetsignore (in this directory) keeps keys/ and scripts/
# OUT of the upload so the license secret is never publicly reachable.
[assets]
directory = "./"
binding = "ASSETS"

# D1 database holding the device-binding table (scripts/schema.sql). A single atomic SQL
# statement enforces the 2-device cap (see the comment above INSERT_SQL in _worker.js) —
# no Durable Object migration needed, so this whole project stays drag-and-drop deployable.
# CLI users: run `npx wrangler d1 create invoice-studio-licensing` first and paste the
# database_id it prints below. Dashboard users: create the database via clicks instead and
# skip this block — bind it as "DB" from the Pages project's Settings -> Functions tab.
[[d1_databases]]
binding = "DB"
database_name = "invoice-studio-licensing"
database_id = "<paste-database-id-from-`wrangler d1 create`-or-the-dashboard>"
